# ============================================
# NGINX - (OCI)
# ============================================

upstream portfolio-web {
    server portfolio-web:3000; # use the service name defined in docker-compose and the internal port
    keepalive 32;
}

# ============================================
# HTTP -> HTTPS Redirect
# ============================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    
    server_name _;   
 
    
   
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================
# HTTPS Server
# ============================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name _; 

    # ============================================
    # SSL Configuration
    # ============================================
    ssl_certificate     /etc/nginx/certs/cloudflare-origin.pem;
    ssl_certificate_key /etc/nginx/certs/cloudflare-origin.key;
    
    # SSL Protocols
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # HSTS - HTTPS Strict Transport Security
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ============================================
    # Security Headers
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    #add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: https://www.google-analytics.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://www.google-analytics.com; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com;" always;
    add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; frame-src 'self' https:; connect-src 'self' https:;" always;
    # ============================================
    # Logging
    # ============================================
    access_log /var/log/nginx/access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/error.log warn;

    # ============================================
    # Limits
    # ============================================
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # Timeouts
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

 

    # ============================================
    # Proxy a portfolio
    # ============================================
    location / {
        proxy_pass http://portfolio-web;

      
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        
        proxy_set_header X-Forwarded-Proto https; 
        
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443; 

        
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Buffering 
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 256 16k;
        proxy_busy_buffers_size 256k;

        # Timeouts (Slightly increased to avoid Cloudflare's 502)
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

  
    # ============================================
    # Health Check
    # ============================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ============================================
    # Block access to sensitive files
    # ============================================

    location ^~ /.portfolio/ {
        proxy_pass http://portfolio-web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ============================================
    # Block access to configuration files
    # ============================================
    location ~ \.(env|yml|yaml|json|config|secret|key|pem|cert)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}