repos:
  # 1. Utilidades básicas de limpieza
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  # 2. Herramientas Locales (Compatibles con Windows)
  - repo: local
    hooks:
      - id: terraform-fmt
        name: Terraform fmt
        entry: terraform fmt
        language: system
        files: \.tf$

      - id: trivy
        name: Trivy Security Scan
        entry: trivy fs . --scanners vuln,secret,config
        language: system
        pass_filenames: false