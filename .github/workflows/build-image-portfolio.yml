name: CI/CD - Build and Push to GHCR

on:
  push:
    branches: [ "main" ]
    paths:
      - 'portfolio-web/**'
      - 'docker/DockerFile'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      package_name: portfolio-web 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/DockerFile
          push: true
          tags: |
            ghcr.io/${{ github.actor }}/portfolio-web:latest
            ghcr.io/${{ github.actor }}/portfolio-web:${{ github.sha }}


  cleanup:
    runs-on: ubuntu-latest
    needs: build-and-push 
    steps:
      - name: Delete old versions
        uses: actions/delete-package-versions@v5
        with:
          
          package-name: 'portfolio-web' 
          package-type: 'container'
         
          min-versions-to-keep: 2 
          delete-only-untranslated-versions: 'false'